<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>海错图 - 国风合成小游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a1929 0%, #0d2133 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont,, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    #game-canvas {
      display: block;
      background: transparent;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: #fff;
      z-index: 999;
      text-align: center;
      background: rgba(10, 25, 41, 0.9);
      padding: 30px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    .error {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 60, 60, 0.9);
      padding: 24px;
      border-radius: 12px;
      max-width: 80%;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .error h3 {
      margin-bottom: 10px;
      font-size: 18px;
    }
    /* 全屏按钮 */
    #fullscreen-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }
    #fullscreen-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>

<div id="game-container">
  <canvas id="game-canvas"></canvas>
  <div id="loading">
    <div>海错图 加载中...</div>
  </div>
</div>

<!-- 底部按钮组 -->
<div id="bottom-buttons" style="position: fixed;bottom: 0;left: 0;width: 100%;background: rgba(10, 25, 41, 0.8);backdrop-filter: blur(10px);padding: 10px;display: flex;gap: 12px;justify-content: center;align-items: center;z-index: 1000;">
  <button id="arrange-btn" onclick="arrangeBoard()" style="flex: 0 0 auto;background: rgba(255, 255, 255, 0.15);border: 1px solid rgba(255, 255, 255, 0.3);color: white;padding: 10px 20px;border-radius: 8px;cursor: pointer;font-size: 15px;transition: all 0.2s;" onmouseover="this.style.background='rgba(255, 255, 255, 0.25)'" onmouseout="this.style.background='rgba(255, 255, 255, 0.15)'">整理</button>
  <button id="spawn-btn" onclick="trySpawnByScore()" style="flex: 0 0 auto;background: rgba(76, 175, 80, 0.15);border: 1px solid rgba(76, 175, 80, 0.3);color: white;padding: 10px 20px;border-radius: 8px;cursor: pointer;font-size: 15px;transition: all 0.2s;" onmouseover="this.style.background='rgba(76, 175, 80, 0.25)'" onmouseout="this.style.background='rgba(76, 175, 80, 0.15)'">生成</button>
  <button id="fullscreen-btn" onclick="toggleFullscreen()" style="flex: 0 0 auto;background: rgba(100, 150, 255, 0.15);border: 1px solid rgba(100, 150, 255, 0.3);color: white;padding: 10px 20px;border-radius: 8px;cursor: pointer;font-size: 15px;transition: all 0.2s;" onmouseover="this.style.background='rgba(100, 150, 255, 0.25)'" onmouseout="this.style.background='rgba(100, 150, 255, 0.15)'">全屏</button>
</div>

<script>
// =============================================
// 纯网页版 - 微信小程序 API 模拟
// 完全移除微信依赖，所有API用浏览器原生实现
// =============================================

// 全局 wx 对象模拟
window.wx = {
  // 获取系统信息
  getSystemInfoSync: function() {
    return {
      windowWidth: window.innerWidth,
      windowHeight: window.innerHeight,
      pixelRatio: window.devicePixelRatio || 1
    };
  },
  
  // 创建画布 - 直接返回已有的canvas
  createCanvas: function() {
    return document.getElementById('game-canvas');
  },
  
  // 设备方向监听 - 浏览器不需要，空实现
  onDeviceOrientationChange: function() {},
  stopDeviceOrientationListening: function() {},
  startDeviceOrientationListening: function() {},
  
  // 选择器查询 - 空实现
  createSelectorQuery: function() {
    return {
      select: () => this,
      boundingClientRect: () => this,
      exec: () => {}
    };
  }
};

// =============================================
// 小程序框架模拟 - 适配原代码结构
// =============================================

// getApp 模拟
window.getApp = function() {
  return window.app;
};

// App 全局实例
window.app = {
  globalData: {
    userId: 'browser_user_' + Date.now(),
    systemInfo: wx.getSystemInfoSync()
  },
  
  // API 请求封装 - 浏览器 fetch 实现
  request: function(options) {
    const url = options.url;
    const fullUrl = window.location.origin + '/api' + url;
    
    fetch(fullUrl, {
      method: options.method || 'GET',
      headers: {
        'Content-Type': 'application/json',
      },
      body: options.method === 'POST' ? JSON.stringify(options.data || {}) : undefined
    })
    .then(response => response.json())
    .then(data => {
      options.success && options.success(data);
    })
    .catch(error => {
      console.error('[API] 请求失败:', error);
      options.fail && options.fail(error);
    });
  }
};

// Page 模拟 - 网页版直接调用onLoad
window.Page = function(pageConfig) {
  // 保存页面配置，等待DOM加载完成后调用
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(() => {
      pageConfig.onLoad && pageConfig.onLoad();
      startGameLoop();
    }, 100);
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      pageConfig.onLoad && pageConfig.onLoad();
      startGameLoop();
    });
  }
};

// =============================================
// 游戏循环 - 浏览器 requestAnimationFrame
// =============================================

function startGameLoop() {
  document.getElementById('loading').style.display = 'none';
  
  function loop() {
    if (typeof window.gameLoop === 'function') {
      window.gameLoop();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

// =============================================
// 工具函数 - 网页版增强
// =============================================

// 全屏切换
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById('fullscreen-btn').textContent = '退出';
  } else {
    document.exitFullscreen();
    document.getElementById('fullscreen-btn').textContent = '全屏';
  }
}

// 窗口大小改变自适应
window.addEventListener('resize', function() {
  if (window.game && window.game.renderer) {
    window.game.width = window.innerWidth;
    window.game.height = window.innerHeight;
    window.game.renderer.resize(window.game.width, window.game.height);
    if (window.game.garden) {
      window.game.garden.resize(window.game.width, window.game.height);
    }
  }
});

// 全局错误处理
window.addEventListener('error', function(e) {
  console.error('Game error:', e.error);
  const loading = document.getElementById('loading');
  loading.innerHTML = 
    '<div class=\"error\">' +
    '<h3>加载出错</h3>' +
    '<p>' + e.error.message + '</p>' +
    '<p style="font-size: 12px; margin-top: 10px; opacity: 0.8">行: ' + (e.lineno || 'unknown') + '<br>按F12打开控制台查看详细信息</p>' +
    '</div>';
  loading.style.display = 'block';
});

// 触摸事件兼容
document.addEventListener('touchmove', function(e) {
  e.preventDefault();
}, { passive: false });
</script>

<!-- 核心依赖模块 - 必须按顺序加载，game-native.js 依赖它们 -->

<script src="game-native.js"></script>
<script>
// 浏览器启动游戏
window.onload = function() {
  initGame();
};

// ========== 工具函数: roundRect ==========
function roundRect(ctx, x, y, width, height, radius) {
  if (typeof radius === 'number') {
    radius = { tl: radius, tr: radius, br: radius, bl: radius };
  }
  ctx.moveTo(x + radius.tl, y);
  ctx.lineTo(x + width - radius.tr, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
  ctx.lineTo(x + width, y + height - radius.br);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
  ctx.lineTo(x + radius.bl, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
  ctx.lineTo(x, y + radius.tl);
  ctx.quadraticCurveTo(x, y, x + radius.tl, y);
  ctx.closePath();
  return ctx;
}

// 添加 fillRoundRect 和 strokeRoundRect polyfill (兼容所有浏览器)
if (!CanvasRenderingContext2D.prototype.fillRoundRect) {
  CanvasRenderingContext2D.prototype.fillRoundRect = 
  function(x, y, width, height, radius) {
    roundRect(this, x, y, width, height, radius);
    this.fill();
    return this;
  };
  CanvasRenderingContext2D.prototype.strokeRoundRect = 
  function(x, y, width, height, radius) {
    roundRect(this, x, y, width, height, radius);
    this.stroke();
    return this;
  };
}
</script>

</body>
</html>
